baseURL = "/parser"
title = "Groupdocs API References"
staticdir = 'content/sites/groupdocs/parser/static'
enableRobotsTXT = true

# Hugo allows theme composition (and inheritance). The precedence is from left to right.
theme = ["docs"]
pygmentsUseClasses = true
pygmentsCodeFences = true
disablePathToLower = true
pluralizeListTitles = false


defaultContentLang = 'en'
[languages]
  [languages.en]
    contentDir = 'content/sites/groupdocs/parser/english'
    languageName = 'English'
	languageCode = "en"
    flag = "flag-us"
    weight = 10
disableKinds = ["taxonomy", "term", "RSS"]
ignoreFiles = ["(?i:readme.md)", '\.spin$']

# Image processing configuration.
[imaging]
resampleFilter = "CatmullRom"
quality = 75
anchor = "smart"

[services]
[services.googleAnalytics]
# Comment out the next line to disable GA tracking. Also disables the feature described in [params.ui.feedback].
# id = "UA-00000000-0"

[markup]
	[markup.tableOfContents]
		endLevel = 4
		ordered = false
		startLevel = 2
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineAnchors = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = false
    tabWidth = 4

# Everything below this are Site Params

[params]
showFeedbackForm = true
defaultTheme = "light"
geekdocDarkModeToggle = false
GeekdocCollapseAllSections = true
GeekdocSearch = false
showSearchInput = true
copyright = "The groupdocs Authors"
privacy_policy = "https://policies.google.com/privacy"
topbar_search_active = false
logo_rel_link = ""

# Containerize Menu
[params.containerize]
menu = "groupdocs-en"

[params.meta]
msapplication_TileColor = "#2b5797"
msapplication_config = "https://cms.admin.containerize.com/templates/groupdocs/images/browserconfig.xml"
theme_color = "#ffffff"
author = "Groupdocs"

# Title of 404 page
title_404_page = "404 - Page Not Found | groupdocs API References"

# Open Grapgh settings
title = "groupdocs API References"
images = ["images/groupdocs-image-for-open-graph.jpg"]
description = "Class Libraries for the developers to manipulate & process Files from Word, Excel, PowerPoint, Visio, PDF, CAD & several other categories in Web, Desktop or Mobile apps. Develop & deploy on Windows, Linux, MacOS & Android platforms."

# Specify a value here if your content directory is not in your repo's root directory
# github_subdir = ""

# Google Custom Search Engine ID. Remove or comment out to disable search.
# gcs_engine_id = "011737558837375720776:fsdu1nryfng"

# User interface configuration
[params.ui]
# Enable to show the side bar menu in its compact state.
sidebar_menu_compact = true
#  Set to true to disable breadcrumb navigation.
breadcrumb_disable = false
#  Set to true to hide the sidebar search box (the top nav search box will still be displayed if search is enabled)
sidebar_search_disable = true
#  Set to false if you don't want to display a logo (/assets/icons/logo.svg) in the top nav bar
navbar_logo = false
# Set to true to disable the About link in the site footer
footer_about_disable = false


[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = false
  [minify.tdewolff]
    [minify.tdewolff.css]
      decimals = -1
      keepCSS2 = true
    [minify.tdewolff.html]
      keepConditionalComments = true
      keepDefaultAttrVals = true
      keepDocumentTags = true
      keepEndTags = true
      keepQuotes = false
      keepWhitespace = false
    [minify.tdewolff.js]
    [minify.tdewolff.json]
    [minify.tdewolff.svg]
      decimals = -1
    [minify.tdewolff.xml]
      keepWhitespace = false

[deployment]
[[deployment.matchers]]
# Set custom content type for /sitemap.xml
#pattern = "^sitemap\\.xml$"
#pattern = "^[a-z]\\.xml$"
pattern = "^.+\\.(xml)$"
contentType = "application/xml"
gzip = true
force = true

[Taxonomies]

# Per-page Markdown (.md) + llms.txt + llms-full.txt — matches docs.groupdocs.* .
# Rendered by the theme's _default/single.md|list.md and *.llmstxt.txt|*.llmsfull.txt layouts.
# Deploy renames pretty .md (…/x/index.md) to ugly (…/x.md) via scripts/move_md_to_ugly_urls.sh.
[mediaTypes."text/markdown"]
  suffixes = ["md"]

[outputFormats.MD]
  mediaType = "text/markdown"
  isPlainText = true
  isHTML = false
  notAlternative = true
  permalinkable = false

[outputFormats.LLMSTXT]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

[outputFormats.LLMSFULL]
  mediaType = "text/plain"
  baseName = "llms-full"
  isPlainText = true
  notAlternative = true

[outputs]
  # llms-full only at the build home: content is all section bundles, so LLMSFULL on
  # `section` would emit a (mostly redundant) llms-full.txt for all pages.
  home = ["HTML", "MD", "LLMSTXT", "LLMSFULL"]
  section = ["HTML", "MD"]
  page = ["HTML", "MD"]

# UTF-8 charset for text outputs served from S3 (matches docs/products deploy).
[[deployment.matchers]]
pattern = "^.+[.]md$"
contentType = "text/markdown; charset=utf-8"
gzip = true
[[deployment.matchers]]
pattern = "^.+[.]html$"
contentType = "text/html; charset=utf-8"
gzip = true
[[deployment.matchers]]
pattern = "^.+[.]txt$"
contentType = "text/plain; charset=utf-8"
gzip = true
