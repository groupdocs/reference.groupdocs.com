# Home page product grid — single source of truth.
# Rendered by themes/docs/layouts/shortcodes/products-grid.html via {{< products-grid >}}
# in content/sites/groupdocs/home/english/_index.md.
# To add a product: append a [[product]] block. Order on the page follows `weight` ascending.
#
# Fields:
#   key         product family key (informational)
#   title       card heading; the part before the first "." renders as the brand label
#   url         family landing page (platform buttons link to {url}/{platform}/)
#   icon        file suffix of /images/products/groupdocs-{icon}.svg
#   weight      display order (ascending)
#   description card blurb
#   platforms   subset/order of: net, java, nodejs-java, python-net

[[product]]
key         = "conversion"
title       = "GroupDocs.Conversion"
url         = "/conversion"
icon        = "conversion"
weight      = 1
description = "Convert between 170+ document and image formats — PDF, Office, CAD, email, and more."
platforms   = ["net", "java", "nodejs-java", "python-net"]

