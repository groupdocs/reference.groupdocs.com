{{ if eq .Params.linktitle "Contact"}}
<script src="https://cdn.form.io/formiojs/formio.full.min.js"></script>
<script>
var formUrl = "https://form.aspose.com/form/662b53e475ec13160e90e70e";
document.addEventListener("DOMContentLoaded", function () {
    Formio.createForm(document.getElementById('formio'), formUrl).then((form) => {
        form.on('submit', function () {
            alert("We have received your meeting request and will get back to you shortly.");
        });
    });
});
function openLiveChat() {
    window.open('https://chat.containerize.com/livechat?mode=popout', 'Live Chat', 'width=500,height=600');
}
</script>
{{ end }}
