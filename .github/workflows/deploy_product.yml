name: Deploy Product

# Reusable build+deploy for a single product family of reference.groupdocs.com.
# Builds with Hugo (theme is vendored in themes/docs — no separate checkout),
# deploys to S3 via `hugo deploy`, and invalidates CloudFront.
on:
  workflow_call:
    inputs:
      product_family:
        description: 'Product family (e.g. annotation, viewer). Matches config/sites/groupdocs/<product_family>.'
        required: true
        type: string
      environment:
        description: "Target environment: 'production' or 'staging'."
        required: true
        type: string
      invalidate_paths:
        description: 'CloudFront paths to invalidate. Defaults to /<product_family>/*.'
        required: false
        type: string
        default: ''
      max_deletes:
        description: 'hugo deploy --maxDeletes value (-1 = unlimited).'
        required: false
        type: string
        default: '-1'
      ref:
        description: 'Git ref/branch to build. Empty = the triggering ref (default). Set e.g. to "production" for scheduled jobs that must build a specific branch HEAD.'
        required: false
        type: string
        default: ''

jobs:
  deploy:
    name: Deploy ${{ inputs.product_family }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}    # empty -> triggering ref (deploy_all); set for scheduled branch builds
          fetch-depth: 0    # full history for .GitInfo / .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.101.0'
          extended: true

      - name: Build
        run: hugo --configDir config/sites/groupdocs/${{ inputs.product_family }} --environment ${{ inputs.environment }} --minify

      - name: Resolve relative .md links to absolute (must precede the ugly-URL rename)
        run: python3 resolve_md_links.py public --base-url "$BASE"
        env:
          # Match the build's .Site.BaseURL: full URL for production, root-relative for staging.
          BASE: ${{ inputs.environment == 'production' && format('https://reference.groupdocs.com/{0}', inputs.product_family) || format('/{0}', inputs.product_family) }}

      - name: Convert .md pretty URLs to ugly (…/x/index.md -> …/x.md)
        run: |
          chmod +x ./move_md_to_ugly_urls.sh
          ./move_md_to_ugly_urls.sh public

      - name: Publish family Markdown to bucket root as <product>.md
        # The product build's home is the family landing page; serve its .md at
        # /<product>.md (bucket root) instead of /<product>/index.md. Skipped for the
        # `home` build, whose root index.md is the site landing page.
        if: inputs.product_family != 'home'
        run: |
          BUCKET=${{ inputs.environment == 'production' && 'reference.groupdocs.com' || 'reference2.groupdocs.com' }}
          aws s3 cp public/index.md "s3://$BUCKET/${{ inputs.product_family }}.md" \
            --content-type "text/markdown; charset=utf-8" --region us-west-2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS }}

      - name: Drop the prefixed family Markdown (served at /<product>.md instead)
        # Removing it locally makes `hugo deploy --maxDeletes` delete the old
        # /<product>/index.md from S3, so the family .md exists only at the root.
        if: inputs.product_family != 'home'
        run: rm -f public/index.md

      - name: Deploy to S3
        run: hugo --configDir config/sites/groupdocs/${{ inputs.product_family }} --environment ${{ inputs.environment }} deploy --target "${{ inputs.environment == 'production' && 'Production' || 'Stage' }}" --maxDeletes ${{ inputs.max_deletes }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS }}

      - name: Invalidate CloudFront
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ inputs.environment == 'production' && secrets.AWS_DISTRIBUTION_PROD || secrets.AWS_DISTRIBUTION }}
          PATHS: ${{ inputs.invalidate_paths != '' && inputs.invalidate_paths || format('/{0}/* /{0}.md', inputs.product_family) }}
          AWS_REGION: 'us-west-2'
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS }}
